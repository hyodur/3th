<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꼬마 마법사 아리의 덧셈 연습</title>
    <style>
        body { text-align: center; font-family: 'Malgun Gothic', sans-serif; background-color: #f9f9fa; margin: 0; padding: 20px; overflow-x: hidden; }
        #game-container { position: relative; background-color: white; border-radius: 20px; padding: 30px; max-width: 500px; margin: 40px auto 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #cookie_counter { position: absolute; top: -20px; right: 20px; background-color: #ff9800; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 3px solid white; }
        h1 { color: #8A2BE2; font-size: 28px; margin-top: 20px; }
        #ari_img { width: 200px; height: 200px; object-fit: contain; margin-bottom: 20px; transition: 0.3s; }
        #question { font-size: 45px; font-weight: bold; color: #333; margin: 10px 0 20px 0; }
        #user_answer { font-size: 35px; width: 150px; text-align: center; border: 3px solid #ccc; border-radius: 10px; padding: 10px; margin-bottom: 20px; outline: none; }
        button { font-size: 24px; padding: 12px 30px; background-color: #4CAF50; color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); transition: 0.2s; font-weight: bold; }
        button:active { transform: scale(0.95); }
        #feedback { font-size: 22px; font-weight: bold; margin-top: 20px; min-height: 30px; }
        
        #giant_cookie { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 200px; z-index: 1000; pointer-events: none; }
        .pop-animation { animation: popAndDisappear 1s ease-in-out forwards; }
        
        @keyframes popAndDisappear {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="cookie_counter">🍪 내 쿠키: <span id="cookie_count">0</span>개</div>
    <h1>🌟 마법사 아리와 덧셈 연습 🌟</h1>
    <img id="ari_img" src="images/ari_happy.png" alt="꼬마 마법사 아리">
    <div id="question">100 + 200 = ?</div>
    <input type="number" id="user_answer" placeholder="정답">
    <br>
    <button onclick="checkAnswer()">확인하기!</button>
    <div id="feedback"></div>
</div>

<img id="giant_cookie" src="images/cookie.png" alt="대왕 쿠키">

<script>
    let num1, num2, correctAnswer;
    
    // 💡 마법의 저장소 기능! 기존에 저장된 쿠키가 있으면 불러오고, 없으면 0개로 시작
    let myCookies = localStorage.getItem('ari_cookies') ? parseInt(localStorage.getItem('ari_cookies')) : 0;
    
    // 화면 열리자마자 저장된 쿠키 개수 보여주기
    document.getElementById('cookie_count').innerText = myCookies;

    function makeQuestion() {
        num1 = Math.floor(Math.random() * 900) + 100;
        num2 = Math.floor(Math.random() * 900) + 100;
        correctAnswer = num1 + num2;
        
        document.getElementById('question').innerText = num1 + " + " + num2 + " = ?";
        document.getElementById('user_answer').value = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('ari_img').src = 'images/ari_happy.png';
        document.getElementById('user_answer').focus();
    }

    function checkAnswer() {
        let userAnswer = parseInt(document.getElementById('user_answer').value);
        let feedbackEl = document.getElementById('feedback');
        let ariImg = document.getElementById('ari_img');
        let giantCookie = document.getElementById('giant_cookie');
        
        if (userAnswer === correctAnswer) {
            feedbackEl.innerText = "🎉 우와! 정답! 대왕 쿠키 획득!";
            feedbackEl.style.color = "#4CAF50";
            ariImg.src = 'images/ari_happy.png'; 
            
            giantCookie.classList.remove('pop-animation');
            void giantCookie.offsetWidth; 
            giantCookie.classList.add('pop-animation');
            
            setTimeout(() => {
                myCookies++; // 쿠키 1개 증가
                // 💡 쿠키가 늘어날 때마다 패드(브라우저)에 영구 저장!
                localStorage.setItem('ari_cookies', myCookies);
                document.getElementById('cookie_count').innerText = myCookies;
            }, 800);
            
            setTimeout(makeQuestion, 2000); 
        } else {
            feedbackEl.innerText = "🤔 앗... 아리가 헷갈리나 봐. 다시 계산해 볼까?";
            feedbackEl.style.color = "#F44336";
            ariImg.src = 'images/ari_think.png'; 
        }
    }

    makeQuestion();
</script>

</body>
</html>
